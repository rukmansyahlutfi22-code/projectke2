<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Absensi Desa Tanjung Nyiur</title>
  <style>
    :root {
      --primary-color: #1a365d;
      --secondary-color: #2b6cb0;
      --success-color: #2f855a;
      --background-color: #f0f4f8;
      --card-color: #ffffff;
      --text-color: #2d3748;
    }
    body { font-family: -apple-system, sans-serif; background-color: var(--background-color); margin: 0; display: flex; justify-content: center; }
    .android-container { width: 100%; max-width: 480px; min-height: 100vh; background: var(--background-color); }
    
    /* Header Jam Digital */
    .app-bar { background-color: var(--primary-color); color: white; padding: 20px 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    #jam-digital { font-size: 40px; font-weight: bold; letter-spacing: 2px; }
    #tanggal-lengkap { font-size: 16px; margin-bottom: 10px; opacity: 0.9; }
    
    .app-content { padding: 16px; }
    .android-card { background: var(--card-color); border-radius: 12px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); margin-bottom: 16px; }
    .btn-android { width: 100%; padding: 14px; background-color: var(--secondary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-submit { background-color: var(--success-color); }
    #area-aplikasi { display: none; }
    .camera-box { width: 100%; border-radius: 8px; overflow: hidden; background: #e2e8f0; margin-bottom: 10px; }
    #kamera-preview { width: 100%; display: block; transform: scaleX(-1); }
    #hasil-foto { width: 100%; display: none; border-radius: 8px; }
    #canvas { display: none; }
  </style>
</head>
<body>

  <div class="android-container">
    <div class="app-bar">
      <div id="jam-digital">00:00:00</div>
      <div id="tanggal-lengkap">Memuat tanggal...</div>
      <div style="font-weight: bold; font-size: 14pt;">ABSENSI DESA TANJUNG NYIUR</div>
    </div>

    <div class="app-content">
      <div id="area-login" class="android-card">
        <h3 style="text-align: center;">Verifikasi Masuk</h3>
        <input type="password" id="pin-input" placeholder="PIN" style="width:100%; padding:12px; text-align:center; font-size:18pt; border:1px solid #ccc; border-radius:8px; box-sizing:border-box;">
        <button class="btn-android" style="margin-top:10px;" onclick="verifikasiAkses()">Masuk</button>
      </div>

      <div id="area-aplikasi">
        <div class="android-card">
          <label>Nama & Tipe:</label>
          <select id="nama-perangkat" style="width:100%; padding:10px; margin-bottom:10px;">
            <option>Rukmansyah (Sekretaris Desa)</option>
            <option>Zulkipli (Kepala Desa)</option>
          </select>
          <select id="tipe-absen" style="width:100%; padding:10px;">
            <option>JAM MASUK</option>
            <option>JAM PULANG</option>
          </select>
        </div>
        <button id="btn-kirim" class="btn-android btn-submit" onclick="alert('Absen Berhasil!')">Kirim Absen</button>
      </div>
    </div>
  </div>

  <script>
    // Fungsi Jam & Tanggal
    function updateWaktu() {
      const now = new Date();
      // Jam
      document.getElementById("jam-digital").innerText = now.toLocaleTimeString('id-ID', { hour12: false });
      // Tanggal
      const opt = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      document.getElementById("tanggal-lengkap").innerText = now.toLocaleDateString('id-ID', opt);
    }
    setInterval(updateWaktu, 1000);
    updateWaktu();

    function verifikasiAkses() {
      if(document.getElementById("pin-input").value === "1234") {
        document.getElementById("area-login").style.display = "none";
        document.getElementById("area-aplikasi").style.display = "block";
      } else {
        alert("PIN Salah!");
      }
    }
  </script>
</body>
</html>
